name: Muslim Islam Live Stream
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install hijri-converter yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate Stream
        run: |
          mkdir -p live
          mkdir -p downloads
          # Logic script ab videos download bhi kare ga aur command bhi banaye ga
          python3 logic.py > run_stream.sh
          chmod +x run_stream.sh
          timeout 12m ./run_stream.sh || true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: live
          branch: gh-pages
          folder: live
          branch: gh-pages
